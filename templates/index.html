<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maina Series | Home</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #141414; color: white; }
        header { background-color: #000; padding: 1.5rem; text-align: center; border-bottom: 3px solid #e50914; }
        .search-bar { margin: 20px auto; max-width: 500px; display: flex; }
        .search-bar input { flex: 1; padding: 10px; font-size: 16px; border: none; border-radius: 4px 0 0 4px; }
        .search-bar button { padding: 10px 20px; background-color: #e50914; color: white; border: none; border-radius: 0 4px 4px 0; cursor: pointer; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background-color: #222; border-radius: 8px; overflow: hidden; text-align: center; padding-bottom: 15px; }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .btn-watch { background-color: #e50914; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; display: inline-block; margin-top: 10px; font-weight: bold;}
    </style>
</head>
<body>
    <header>
        <h1>Maina.com Series Hub</h1>
        <form action="/" method="GET" class="search-bar">
            <input type="text" name="search" placeholder="Search series..." value="{{ search_query }}">
            <button type="submit">Search</button>
        </form>
    </header>
    <div class="container">
        <h2>Trending TV Series</h2>
        <div class="grid">
            {% for series in series_list %}
            <div class="card">
                <img src="{{ series.poster }}" alt="{{ series.title }}">
                <h3>{{ series.title }}</h3>
                <p>{{ series.genre }} ({{ series.year }})</p>
                <a href="/series/{{ series.id }}" class="btn-watch">Watch Series</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
